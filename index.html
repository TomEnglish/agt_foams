<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>All Good Things Bakery — Recipe Review</title>
<style>
:root{--green:#2a8d57;--orange:#d6852f;--ink:#27313a;--line:#dfe4ea;--blue:#37597a}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font:15px/1.5 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--ink);display:flex;flex-direction:column}
header{background:#1d2b3a;color:#fff;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center}
header h1{font-size:16px;margin:0;font-weight:650}
.prog{font-size:13px;opacity:.92}.prog b{color:#7fe0a6}
.btn{font:inherit;border:0;border-radius:7px;padding:7px 13px;cursor:pointer;background:var(--blue);color:#fff}
.btn:hover{filter:brightness(1.1)}.btn.ghost{background:#33455a}
#finishBtn{margin-left:auto;background:var(--green);font-weight:600}
.navbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:8px 16px;background:#eef1f5;border-bottom:1px solid var(--line)}
.navbar select{font:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:7px;flex:1 1 240px;max-width:60vw}
.navbar .pos{font-size:13px;color:#5a6573}
main{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
.imgpane{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
.tools{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;padding:8px 12px;background:#f6f8fa;border-bottom:1px solid var(--line);font-size:13px}
.tools button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 9px;cursor:pointer}
.hint{padding:6px 12px;background:#fff8ec;border-bottom:1px solid var(--line);font-size:13px;color:#7a5a1e}
.imgbox{flex:1;overflow:auto;background:#141b22}
.imgbox img{display:block;max-width:100%;transform-origin:top center}
.editpane{display:flex;flex-direction:column;min-width:0;padding:14px;gap:11px;overflow:auto}
.rname{font-size:19px;font-weight:700;margin:0;color:#1d2b3a}
.plabel{font-size:12px;color:#8a95a1;margin-top:-7px}
.editpane label{font-size:12px;font-weight:600;color:#5a6573;text-transform:uppercase;letter-spacing:.03em}
textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font:14px/1.6 ui-monospace,Menlo,Consolas,monospace;resize:vertical}
#text{min-height:200px}#notes{min-height:54px;font-family:inherit}
.statusrow{display:flex;gap:10px}
.statusrow button{flex:1;border:2px solid var(--line);background:#fff;border-radius:9px;padding:11px;cursor:pointer;font:inherit;font-weight:600;color:#5a6573}
.statusrow button.app.on{border-color:var(--green);background:#e9f7ef;color:var(--green)}
.statusrow button.chg.on{border-color:var(--orange);background:#fdf2e6;color:var(--orange)}
.navrow{display:flex;justify-content:space-between;gap:10px;margin-top:auto;padding-top:4px}
.modal{position:fixed;inset:0;background:rgba(20,27,34,.6);display:flex;align-items:center;justify-content:center;padding:20px}
.modal[hidden]{display:none}
.card{background:#fff;border-radius:12px;max-width:680px;width:100%;max-height:86vh;overflow:auto;padding:22px}
.card h2{margin:0 0 4px}.sumpage{font-weight:700;margin:14px 0 4px;color:#1d2b3a}
.sumitem{border-top:1px solid var(--line);padding:7px 0;font-size:14px}
.tag{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px}
.tag.approved{background:#e9f7ef;color:var(--green)}.tag.changes{background:#fdf2e6;color:var(--orange)}.tag.pending{background:#eef1f5;color:#8a95a1}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
@media(max-width:760px){main{grid-template-columns:1fr;grid-auto-rows:minmax(280px,auto)}.imgpane{border-right:0;border-bottom:1px solid var(--line)}.navbar select{max-width:100%}}
</style></head>
<body>
<header>
 <h1>🧁 All Good Things Bakery — Recipe Review</h1>
 <span class="prog" id="prog"></span>
 <button class="btn" id="finishBtn">Finish &amp; send back ✓</button>
</header>
<div class="navbar">
 <button class="btn ghost" id="prev">‹ Prev</button>
 <select id="jump" title="Jump to any recipe"></select>
 <button class="btn ghost" id="next">Next ›</button>
 <span class="pos" id="pos"></span>
</div>
<main>
 <div class="imgpane">
  <div class="tools">
   <button id="rotate">⟳ Rotate page</button>
   <label>zoom <input type="range" id="zoom" min="1" max="5" step="0.1" value="1"></label>
   <a id="full" target="_blank" style="margin-left:auto;color:var(--blue)">open photo ↗</a>
  </div>
  <div class="hint" id="hint"></div>
  <div class="imgbox" id="vp"><img id="img" alt="recipe photo"></div>
 </div>
 <div class="editpane">
  <h2 class="rname" id="rname"></h2>
  <div class="plabel" id="plabel"></div>
  <div><label>Recipe text — fix anything that's wrong</label>
   <textarea id="text" spellcheck="false"></textarea></div>
  <div class="statusrow">
   <button class="app" id="approve">✓ Approve</button>
   <button class="chg" id="changes">✎ Needs changes</button>
  </div>
  <div><label>Notes (optional)</label>
   <textarea id="notes" placeholder="Anything to tell the team about this recipe…"></textarea></div>
  <div class="navrow">
   <button class="btn ghost" id="prev2">‹ Previous</button>
   <button class="btn" id="next2">Next recipe ›</button>
  </div>
 </div>
</main>
<div class="modal" id="finish" hidden><div class="card">
 <h2>Review summary</h2>
 <p id="sumhead" style="color:#5a6573;margin-top:4px"></p>
 <div id="sumlist"></div>
 <div class="actions">
  <button class="btn" id="dl">⬇ Download results (.json)</button>
  <button class="btn ghost" id="copy">Copy summary text</button>
  <button class="btn ghost" id="closeModal">Keep reviewing</button>
 </div>
 <p style="font-size:12px;color:#8a95a1;margin-top:12px">Download the file (or copy the text) and send it back to your consultant. Your progress is also saved in this browser.</p>
</div></div>
<script>
const KEY="agt-recipe-review-v2", RKEY="agt-recipe-review-v2-rot";
let R=[], S=[], i=0, t=null, rotP={};
const $=s=>document.querySelector(s);
const firstLine=x=>(x||'').split('\n').find(l=>l.trim())||'Untitled';
const esc=x=>(x||'').replace(/[<&]/g,c=>c==='<'?'&lt;':'&amp;');
const icon=st=>st==='approved'?'✓':st==='changes'?'✎':'•';
async function init(){
  R=await (await fetch('recipes.json')).json();
  const saved=JSON.parse(localStorage.getItem(KEY)||"[]");
  rotP=JSON.parse(localStorage.getItem(RKEY)||"{}");
  S=R.map(r=>{const s=saved.find(x=>x.id===r.id)||{};
    return {id:r.id,name:r.name,page:r.page,page_label:r.page_label,pos:r.pos,orig:r.text,
      text:s.text!=null?s.text:r.text, status:s.status||'pending', notes:s.notes||''};});
  R.forEach(r=>{if(rotP[r.page]===undefined && r.rotation) rotP[r.page]=r.rotation;});
  buildJump(); render(0);
}
function buildJump(){
  const sel=$('#jump'); sel.innerHTML=''; let grp=null,last=null;
  S.forEach((s,n)=>{
    if(s.page_label!==last){grp=document.createElement('optgroup');grp.label=s.page_label;sel.appendChild(grp);last=s.page_label;}
    const o=document.createElement('option');o.value=n;o.textContent=`${icon(s.status)} ${firstLine(s.text)}`;grp.appendChild(o);
  });
  sel.value=i;
}
const counts=()=>({a:S.filter(s=>s.status==='approved').length,c:S.filter(s=>s.status==='changes').length});
function refreshMeta(){
  const c=counts(); $('#prog').innerHTML=`Approved <b>${c.a}</b> / ${S.length}`+(c.c?` · ${c.c} need changes`:'');
  $('#pos').textContent=`${i+1} / ${S.length}`;
  const o=$('#jump').options[i]; if(o) o.textContent=`${icon(S[i].status)} ${firstLine(S[i].text)}`;
  $('#jump').value=i;
}
function render(n){
  if(n<0||n>=S.length)return; i=n; const s=S[i];
  $('#img').src=s.page; $('#full').href=s.page;
  $('#hint').innerHTML=`📍 <b>${s.page_label}</b> · ${s.pos} — find <b>${esc(firstLine(s.text))}</b> on the photo (zoom / rotate to locate)`;
  $('#rname').textContent=firstLine(s.text); $('#plabel').textContent=s.page_label+' · '+s.pos;
  $('#text').value=s.text; $('#notes').value=s.notes;
  $('#approve').classList.toggle('on',s.status==='approved');
  $('#changes').classList.toggle('on',s.status==='changes');
  applyImg(); refreshMeta();
}
function applyImg(){const z=parseFloat($('#zoom').value)||1, deg=rotP[S[i].page]||0;$('#img').style.transform=`rotate(${deg}deg) scale(${z})`;}
function save(){localStorage.setItem(KEY,JSON.stringify(S.map(s=>({id:s.id,text:s.text,status:s.status,notes:s.notes}))));localStorage.setItem(RKEY,JSON.stringify(rotP));}
$('#text').addEventListener('input',()=>{S[i].text=$('#text').value;$('#rname').textContent=firstLine(S[i].text);clearTimeout(t);t=setTimeout(()=>{save();refreshMeta();},400);});
$('#notes').addEventListener('input',()=>{S[i].notes=$('#notes').value;clearTimeout(t);t=setTimeout(save,400);});
const setStatus=st=>{S[i].status=S[i].status===st?'pending':st;save();render(i);};
$('#approve').onclick=()=>setStatus('approved');
$('#changes').onclick=()=>setStatus('changes');
$('#prev').onclick=$('#prev2').onclick=()=>render(i-1);
$('#next').onclick=$('#next2').onclick=()=>render(i+1);
$('#jump').onchange=e=>render(+e.target.value);
$('#rotate').onclick=()=>{const p=S[i].page;rotP[p]=((rotP[p]||0)+90)%360;save();applyImg();};
$('#zoom').oninput=applyImg;
$('#finishBtn').onclick=showFinish;
function showFinish(){
  const c=counts();
  $('#sumhead').textContent=`${c.a} approved · ${c.c} need changes · ${S.length-c.a-c.c} not yet reviewed (of ${S.length})`;
  let html='',last=null;
  S.forEach(s=>{const ed=s.text.trim()!==s.orig.trim();
    if(s.page_label!==last){html+=`<div class="sumpage">${s.page_label}</div>`;last=s.page_label;}
    html+=`<div class="sumitem"><b>${esc(firstLine(s.text))}</b> <span class="tag ${s.status}">${s.status}</span>${ed?' <span class="tag changes">edited</span>':''}${s.notes?`<div style="font-size:13px;color:#5a6573;margin-top:3px">📝 ${esc(s.notes)}</div>`:''}</div>`;});
  $('#sumlist').innerHTML=html; $('#finish').hidden=false;
}
$('#closeModal').onclick=()=>$('#finish').hidden=true;
$('#dl').onclick=()=>{const blob=new Blob([JSON.stringify(S.map(s=>({id:s.id,name:firstLine(s.text),page:s.page,status:s.status,edited:s.text.trim()!==s.orig.trim(),text:s.text,notes:s.notes})),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='recipe-approvals.json';a.click();};
$('#copy').onclick=()=>{const txt=S.map(s=>`### ${firstLine(s.text)} [${s.status}]${s.text.trim()!==s.orig.trim()?' (edited)':''} — ${s.page_label}\n${s.text}${s.notes?'\nNOTES: '+s.notes:''}`).join('\n\n');
  navigator.clipboard.writeText(txt).then(()=>{$('#copy').textContent='Copied ✓';setTimeout(()=>$('#copy').textContent='Copy summary text',1500);});};
document.addEventListener('keydown',e=>{if(['TEXTAREA','SELECT'].includes(e.target.tagName))return;if(e.key==='ArrowLeft')render(i-1);if(e.key==='ArrowRight')render(i+1);});
init();
</script></body></html>
